<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Closing Day</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0A;
  --surface:#111318;
  --surface-2:#1A1D24;
  --border:#2A2E38;
  --cyan:#26B9DA;
  --cyan-hover:#3FCBE8;
  --gold:#C49A78;
  --text:#F0F0F0;
  --muted:#8B909E;
  --dim:#5F5E5A;
  --red:#E24B4A;
  --red-dim:rgba(226,75,74,0.12);
}
html,body{height:100%;}
body{
  background:var(--bg);
  font-family:'Inter',sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  padding-top:calc(32px + env(safe-area-inset-top));
  padding-bottom:calc(32px + env(safe-area-inset-bottom));
  position:relative;
}

/* SPLASH */
.splash{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.splash-mark{
  font-family:'Playfair Display',serif;
  font-size:36px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.5px;
  display:flex;
  align-items:baseline;
  gap:2px;
}
.splash-mark .star{
  width:14px;
  height:14px;
  margin-left:1px;
  flex-shrink:0;
}
.splash-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:500;}
.spinner{
  width:22px;height:22px;
  border:2px solid rgba(38,185,218,0.18);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-top:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGIN */
.login-card{
  width:100%;
  max-width:380px;
  display:none;
  flex-direction:column;
}
.login-card.show{display:flex;}

.brand{
  text-align:center;
  margin-bottom:36px;
}
.brand-mark{
  font-family:'Playfair Display',serif;
  font-size:36px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.5px;
  display:inline-flex;
  align-items:baseline;
  gap:2px;
  line-height:1;
}
.brand-mark .star{
  width:14px;
  height:14px;
  margin-left:1px;
  flex-shrink:0;
}
.brand-tag{
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:500;
  margin-top:14px;
}

.login-error{
  background:var(--red-dim);
  border:0.5px solid var(--red);
  color:var(--red);
  padding:10px 12px;
  border-radius:8px;
  font-size:12px;
  margin-bottom:14px;
  display:none;
}
.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:9px;
  font-weight:600;
  color:var(--muted);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.field input{
  width:100%;
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:8px;
  padding:13px 14px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:16px;
  min-height:46px;
  transition:border-color 0.15s ease;
}
.field input:focus{
  outline:none;
  border-color:var(--cyan);
}
.field input::placeholder{color:var(--dim);}

.btn{
  width:100%;
  background:var(--cyan);
  color:var(--bg);
  border:none;
  border-radius:8px;
  padding:14px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
  min-height:48px;
  transition:background 0.15s ease;
}
.btn:hover{background:var(--cyan-hover);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn:active{transform:scale(0.98);}

.switch{text-align:center;font-size:12px;margin-top:18px;}
.switch a{
  color:var(--gold);
  cursor:pointer;
  text-decoration:none;
  font-weight:500;
}
.switch a:hover{text-decoration:underline;}

.platform-credit{
  position:absolute;
  bottom:calc(20px + env(safe-area-inset-bottom));
  left:0;right:0;
  text-align:center;
  font-size:9px;
  letter-spacing:2px;
  color:var(--dim);
  font-weight:500;
}
</style>
</head>
<body>

<!-- SPLASH (initial loading state) -->
<div class="splash" id="splash">
  <div class="splash-mark">
    Closing Day<img class="star" src="kinetic_star.png" alt="">
  </div>
  <div class="splash-tag">Less chasing. More closing.</div>
  <div class="spinner"></div>
</div>

<!-- UNIFIED LOGIN -->
<div class="login-card" id="loginCard">
  <div class="brand">
    <div class="brand-mark">
      Closing Day<img class="star" src="kinetic_star.png" alt="">
    </div>
    <div class="brand-tag">Less chasing. More closing.</div>
  </div>

  <div class="login-error" id="loginError"></div>

  <div class="field">
    <label for="loginEmail">Email</label>
    <input id="loginEmail" type="text" autocapitalize="none" autocorrect="off" inputmode="email" placeholder="you@email.com">
  </div>
  <div class="field">
    <label for="loginPassword">Password</label>
    <input id="loginPassword" type="password" placeholder="••••••••">
  </div>
  <button class="btn" id="signinBtn" type="button">Sign In →</button>

  <div class="switch"><a id="forgotLink">Forgot password?</a></div>
</div>

<div class="platform-credit">POWERED BY KINETIC MANAGEMENT</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bob-auth.js"></script>
<script>
'use strict';
const E = id => document.getElementById(id);

(async () => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('b')) {
    window.location.replace('buyerhub.html' + window.location.search);
    return;
  }
  try {
    const user = await BobAuth.currentUser();
    if (user) { routeByRole(user); return; }
  } catch (e) { console.warn('Auth check failed:', e); }
  showLogin();
})();

function routeByRole(user) {
  const role = user?.app_metadata?.role;
  if (role === 'brooke_admin' || role === 'lender_admin') {
    window.location.replace('brooke-admin.html');
  } else if (role === 'buyer') {
    window.location.replace('buyerhub.html');
  } else {
    window.location.replace('crm.html');
  }
}

function showLogin() {
  E('splash').style.display = 'none';
  E('loginCard').classList.add('show');
}

function showError(msg, color) {
  E('loginError').textContent = msg;
  E('loginError').style.display = 'block';
  E('loginError').style.color = color || '';
  E('loginError').style.borderColor = color || '';
}

E('signinBtn').onclick = doSignin;
E('loginPassword').onkeydown = (e) => { if (e.key === 'Enter') doSignin(); };
E('loginEmail').onkeydown = (e) => { if (e.key === 'Enter') doSignin(); };

async function doSignin() {
  const email = (document.getElementById('loginEmail').value || '').trim();
  const password = document.getElementById('loginPassword').value || '';
  console.log('Sign in attempt — email length:', email.length, 'pw length:', password.length);
  if (!email || !password) { showError('Email and password required.'); return; }
  E('loginError').style.display = 'none';
  E('signinBtn').textContent = 'Signing in…';
  E('signinBtn').disabled = true;
  try {
    const { error } = await BobAuth.signIn({ email, password });
    if (error) { showError(error.message || 'Could not sign in.'); return; }
    const user = await BobAuth.currentUser();
    if (user) routeByRole(user);
  } catch (e) {
    showError(e.message || 'Sign in failed.');
  } finally {
    E('signinBtn').textContent = 'Sign In →';
    E('signinBtn').disabled = false;
  }
}

E('forgotLink').onclick = async () => {
  const email = (document.getElementById('loginEmail').value || '').trim();
  if (!email) { showError('Enter your email first, then tap Forgot password.'); return; }
  try {
    await BobAuth.resetPassword(email);
    showError('Password reset email sent. Check your inbox.', 'var(--gold)');
  } catch (e) { showError('Could not send reset: ' + (e.message || e)); }
};
</script>
</body>
</html>
